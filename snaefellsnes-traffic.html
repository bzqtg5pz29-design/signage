<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snæfellsnes Road Conditions</title>

<!-- Reload whole page every 10 minutes (hard reset safety net) -->
<meta http-equiv="refresh" content="600">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

iframe {
  width: 100vw;
  height: 100vh;
  border: 0;
}
</style>
</head>

<body>

<iframe id="trafficMap"
  src="https://umferdin.is/?lat=64.85&lon=-23.50&zoom=9">
</iframe>

<script>
  // Force re-center every 3 minutes (prevents drifting)
  setInterval(() => {
    const iframe = document.getElementById("trafficMap");
    iframe.src = "https://umferdin.is/?lat=64.85&lon=-23.50&zoom=9";
  }, 180000);
</script>

</body>
</html>
