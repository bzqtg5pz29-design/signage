<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IMO Alerts</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
  }
  #box {
    padding: 30px;
  }
  .yellow { background: #f5c542; color: black; }
  .orange { background: #f57c00; color: white; }
  .red { background: #d32f2f; color: white; }
  h1 {
    margin: 0 0 12px 0;
    font-size: 36px;
  }
  p {
    margin: 0;
    font-size: 24px;
    line-height: 1.4;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
<div id="box">
  <h1 id="title">Loading weather alerts…</h1>
  <p id="desc">Please wait.</p>
</div>

<script>
async function loadAlerts() {
  const titleEl = document.getElementById("title");
  const descEl = document.getElementById("desc");
  const box = document.getElementById("box");

  try {
    titleEl.textContent = "Checking IMO alerts…";
    descEl.textContent = "Fetching latest data.";

    const proxyUrl = "https://api.allorigins.win/raw?url=" +
      encodeURIComponent("https://api.vedur.is/cap/v1/capbroker/active/feed/met");

    const res = await fetch(proxyUrl);
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const firstEntry = xml.querySelector("entry");

    if (!firstEntry) {
      box.className = "";
      titleEl.textContent = "No weather alerts in effect";
      descEl.textContent = "No active IMO alert was found right now.";
      return;
    }

    const title = firstEntry.querySelector("title")?.textContent || "Weather alert";
    const summary = firstEntry.querySelector("summary")?.textContent || "Alert found, but no summary available.";

    const lower = title.toLowerCase();
    box.className = "";
    if (lower.includes("red")) box.classList.add("red");
    else if (lower.includes("orange")) box.classList.add("orange");
    else box.classList.add("yellow");

    titleEl.textContent = title;
    descEl.textContent = summary;

  } catch (err) {
    box.className = "";
    titleEl.textContent = "Error loading alerts";
    descEl.textContent = "The page loaded, but the alert feed could not be fetched.\n\n" + err;
    console.error(err);
  }
}

loadAlerts();
setInterval(loadAlerts, 300000);
</script>
</body>
</html>
